name: Deploy Node.js app to Azure Web App - memory-bridge-api

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20.x'

      - name: Install dependencies
        run: npm install

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_4BEC9060BEB74D0383168F1D103D63A4 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_109527962EA04B00BE8E4824687B8367 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_0A99EBA546D5493BBDC0A2BE1DECB33F }}

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: memory-bridge-api
          package: .
          
